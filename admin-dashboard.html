<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Aanwezigheid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); min-height: 100vh; position: relative; }
        .gradient-bg::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.2) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.2) 0%, transparent 50%); pointer-events: none; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-card-strong { background: rgba(255,255,255,0.05); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); }
        .bottom-nav { background: rgba(30,41,59,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08); box-shadow: 0 -10px 40px rgba(0,0,0,0.3); }
        .nav-item { transition: all 0.3s ease; }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item:active { transform: scale(0.95); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ====================================
        // FIREBASE CONFIG — vul jouw gegevens in
        // ====================================
        const firebaseConfig = {
  	apiKey: "AIzaSyD9w-uzVhuvfIR5_UH-xcMKJPAlpx5fKRk",
  	authDomain: "aanwezigheid-app.firebaseapp.com",
  	projectId: "aanwezigheid-app",
  	storageBucket: "aanwezigheid-app.firebasestorage.app",
  	messagingSenderId: "188437676924",
  	appId: "1:188437676924:web:194eb53f7c6eb40ec3daf9",
  	measurementId: "G-V8WM335NFL"
     };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const ADMIN_EMAIL = 'y.moreel@nissewijs.nl';

        // ====================================
        // STATE
        // ====================================
        let selectedAdmin = null;
        let activeTab = 'employees';
        let medewerkers = [];
        let mededelingen = [];
        let editingEmployee = null;
        let editingAnnouncement = null;
        let message = null;

        // ====================================
        // FIREBASE FUNCTIES
        // ====================================
        async function fetchData() {
            try {
                const [medSnap, meddSnap] = await Promise.all([
                    getDocs(collection(db, 'medewerkers')),
                    getDocs(collection(db, 'mededelingen'))
                ]);
                medewerkers = medSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(m => m.naam);
                mededelingen = meddSnap.docs.map(d => ({ id: d.id, ...d.data(), datum: d.data().datum?.toDate() }));
                render();
            } catch (error) {
                console.error('Fetch error:', error);
                showMessage('error', 'Kon data niet laden');
            }
        }

        async function saveEmployee(employee) {
            try {
                if (employee.id) {
                    await updateDoc(doc(db, 'medewerkers', employee.id), {
                        naam: employee.naam,
                        email: employee.email,
                        zichtbaar: employee.zichtbaar
                    });
                    showMessage('success', 'Medewerker bijgewerkt');
                } else {
                    await addDoc(collection(db, 'medewerkers'), {
                        naam: employee.naam,
                        email: employee.email || '',
                        zichtbaar: employee.zichtbaar ?? true
                    });
                    showMessage('success', 'Medewerker toegevoegd');
                }
                editingEmployee = null;
                await fetchData();
            } catch (error) {
                console.error('Save error:', error);
                showMessage('error', 'Kon medewerker niet opslaan');
            }
        }

        async function deleteEmployee(id) {
            if (!confirm('Weet je zeker dat je deze medewerker wilt verwijderen?')) return;
            try {
                await deleteDoc(doc(db, 'medewerkers', id));
                showMessage('success', 'Medewerker verwijderd');
                await fetchData();
            } catch (error) {
                showMessage('error', 'Kon medewerker niet verwijderen');
            }
        }

        async function toggleEmployeeVisibility(employee) {
            try {
                await updateDoc(doc(db, 'medewerkers', employee.id), { zichtbaar: !employee.zichtbaar });
                showMessage('success', 'Zichtbaarheid aangepast');
                await fetchData();
            } catch (error) {
                showMessage('error', 'Kon zichtbaarheid niet wijzigen');
            }
        }

        async function saveAnnouncement(announcement) {
            try {
                if (announcement.id) {
                    await updateDoc(doc(db, 'mededelingen', announcement.id), {
                        titel: announcement.titel,
                        bericht: announcement.bericht,
                        prioriteit: announcement.prioriteit,
                        actief: announcement.actief
                    });
                    showMessage('success', 'Mededeling bijgewerkt');
                } else {
                    await addDoc(collection(db, 'mededelingen'), {
                        titel: announcement.titel,
                        bericht: announcement.bericht,
                        prioriteit: announcement.prioriteit || 'Normaal',
                        actief: announcement.actief ?? true,
                        datum: Timestamp.fromDate(new Date())
                    });
                    showMessage('success', 'Mededeling toegevoegd');
                }
                editingAnnouncement = null;
                await fetchData();
            } catch (error) {
                showMessage('error', 'Kon mededeling niet opslaan');
            }
        }

        async function deleteAnnouncement(id) {
            if (!confirm('Weet je zeker dat je deze mededeling wilt verwijderen?')) return;
            try {
                await deleteDoc(doc(db, 'mededelingen', id));
                showMessage('success', 'Mededeling verwijderd');
                await fetchData();
            } catch (error) {
                showMessage('error', 'Kon mededeling niet verwijderen');
            }
        }

        async function toggleAnnouncementActive(announcement) {
            try {
                await updateDoc(doc(db, 'mededelingen', announcement.id), { actief: !announcement.actief });
                showMessage('success', 'Status aangepast');
                await fetchData();
            } catch (error) {
                showMessage('error', 'Kon status niet wijzigen');
            }
        }

        // ====================================
        // UI HELPERS — globaal zodat inline onclick werkt
        // ====================================
        window._adminFns = {
            setTab: (tab) => { activeTab = tab; render(); },
            setAdmin: (naam, email) => { selectedAdmin = { naam, email }; fetchData(); render(); },
            logout: () => { selectedAdmin = null; render(); },
            editEmployee: (emp) => { editingEmployee = emp ? JSON.parse(emp) : { naam: '', email: '', zichtbaar: true }; render(); },
            cancelEmployee: () => { editingEmployee = null; render(); },
            saveEmployee: (id) => {
                saveEmployee({
                    id: id || null,
                    naam: document.getElementById('emp-naam').value,
                    email: document.getElementById('emp-email').value,
                    zichtbaar: document.getElementById('emp-zichtbaar').checked
                });
            },
            deleteEmployee,
            toggleVisibility: (emp) => toggleEmployeeVisibility(JSON.parse(emp)),
            editAnnouncement: (ann) => { editingAnnouncement = ann ? JSON.parse(ann) : { titel: '', bericht: '', prioriteit: 'Normaal', actief: true }; render(); },
            cancelAnnouncement: () => { editingAnnouncement = null; render(); },
            saveAnnouncement: (id) => {
                saveAnnouncement({
                    id: id || null,
                    titel: document.getElementById('ann-titel').value,
                    bericht: document.getElementById('ann-bericht').value,
                    prioriteit: document.getElementById('ann-prioriteit').value,
                    actief: document.getElementById('ann-actief').checked
                });
            },
            deleteAnnouncement,
            toggleActive: (ann) => toggleAnnouncementActive(JSON.parse(ann))
        };

        function showMessage(type, text) {
            message = { type, text };
            render();
            setTimeout(() => { message = null; render(); }, 3000);
        }

        // ====================================
        // RENDER
        // ====================================
        function render() {
            const appEl = document.getElementById('app');

            if (!selectedAdmin) {
                appEl.innerHTML = `
                    <div class="gradient-bg flex items-center justify-center p-4">
                        <div class="glass-card-strong rounded-2xl sm:rounded-3xl shadow-2xl p-6 sm:p-8 max-w-md w-full animate-fade-in">
                            <div class="text-center mb-6 sm:mb-8">
                                <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 w-20 h-20 sm:w-24 sm:h-24 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-purple-500/30">
                                    <svg class="w-10 h-10 sm:w-12 sm:h-12 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                    </svg>
                                </div>
                                <h2 class="text-2xl sm:text-3xl font-bold text-white mb-2">Admin Dashboard</h2>
                                <p class="text-slate-400 text-sm sm:text-base">Selecteer je naam om verder te gaan</p>
                            </div>
                            <div class="space-y-3">
                                <button onclick="window._adminFns.setAdmin('Yoeran Moreel', '${ADMIN_EMAIL}')"
                                    class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white px-6 py-4 rounded-xl hover:from-purple-700 hover:to-pink-700 transition text-base sm:text-lg font-semibold">
                                    Yoeran Moreel
                                </button>
                            </div>
                            <div class="mt-6 glass-card rounded-xl p-4">
                                <div class="flex items-start gap-3">
                                    <svg class="w-5 h-5 text-purple-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                    </svg>
                                    <p class="text-xs sm:text-sm text-slate-300"><strong class="text-white">Beveiligd:</strong> Alleen toegankelijk voor ${ADMIN_EMAIL}</p>
                                </div>
                            </div>
                        </div>
                    </div>`;
                return;
            }

            const messageHtml = message ? `
                <div class="mb-4 sm:mb-6 p-4 rounded-xl sm:rounded-2xl animate-fade-in ${message.type === 'success' ? 'bg-gradient-to-br from-green-500/20 to-emerald-500/20 border border-green-500/30 text-green-100' : 'bg-gradient-to-br from-red-500/20 to-orange-500/20 border border-red-500/30 text-red-100'}">
                    <div class="flex items-center gap-3">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            ${message.type === 'success' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>' : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'}
                        </svg>
                        <p class="font-medium text-sm sm:text-base">${message.text}</p>
                    </div>
                </div>` : '';

            appEl.innerHTML = `
                <div class="gradient-bg text-white pb-24">
                    <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6">

                        <div class="glass-card-strong shadow-lg mb-4 sm:mb-6 rounded-b-2xl sm:rounded-b-3xl">
                            <div class="px-4 sm:px-6 py-4 sm:py-6">
                                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <div class="flex items-center gap-3 sm:gap-4">
                                        <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 p-2 sm:p-3 rounded-xl border border-purple-500/30">
                                            <svg class="w-6 h-6 sm:w-8 sm:h-8 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                            </svg>
                                        </div>
                                        <div>
                                            <h1 class="text-xl sm:text-2xl font-bold">Admin Dashboard</h1>
                                            <p class="text-xs sm:text-sm text-slate-400">Beheer aanwezigheid systeem</p>
                                        </div>
                                    </div>
                                    <div class="text-left sm:text-right">
                                        <p class="text-xs sm:text-sm text-slate-400">Ingelogd als</p>
                                        <p class="font-semibold text-sm sm:text-base">${selectedAdmin.naam}</p>
                                        <button onclick="window._adminFns.logout()" class="text-xs sm:text-sm text-purple-400 hover:text-purple-300 underline mt-1">Uitloggen</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        ${messageHtml}

                        <div class="mb-4 sm:mb-6">
                            <div class="glass-card rounded-xl sm:rounded-2xl p-1.5 sm:p-2 inline-flex gap-1.5 sm:gap-2">
                                <button onclick="window._adminFns.setTab('employees')" class="px-4 sm:px-6 py-2 sm:py-3 rounded-lg font-medium transition text-sm sm:text-base ${activeTab === 'employees' ? 'bg-gradient-to-r from-purple-600 to-pink-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}">
                                    👥 Medewerkers <span class="hidden sm:inline">(${medewerkers.length})</span>
                                </button>
                                <button onclick="window._adminFns.setTab('announcements')" class="px-4 sm:px-6 py-2 sm:py-3 rounded-lg font-medium transition text-sm sm:text-base ${activeTab === 'announcements' ? 'bg-gradient-to-r from-purple-600 to-pink-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}">
                                    💬 Mededelingen <span class="hidden sm:inline">(${mededelingen.length})</span>
                                </button>
                            </div>
                        </div>

                        <div class="pb-4">
                            ${activeTab === 'employees' ? renderEmployeesTab() : renderAnnouncementsTab()}
                        </div>
                    </div>
                </div>

                <nav class="bottom-nav fixed bottom-0 left-0 right-0 z-50">
                    <div class="max-w-6xl mx-auto px-4 py-3 sm:py-4">
                        <div class="flex items-center justify-around">
                            <a href="medewerker-app.html" class="nav-item flex flex-col items-center gap-1 p-2 rounded-xl group">
                                <svg class="w-6 h-6 text-slate-400 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                <span class="text-xs text-slate-400 group-hover:text-blue-400 transition-colors">Medewerker</span>
                            </a>
                            <a href="index.html" class="nav-item flex flex-col items-center gap-1 p-2 rounded-xl group">
                                <svg class="w-6 h-6 text-slate-400 group-hover:text-slate-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                                <span class="text-xs text-slate-400 group-hover:text-slate-300 transition-colors">Home</span>
                            </a>
                            <a href="lichtkrant.html" class="nav-item flex flex-col items-center gap-1 p-2 rounded-xl group">
                                <svg class="w-6 h-6 text-slate-400 group-hover:text-green-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                <span class="text-xs text-slate-400 group-hover:text-green-400 transition-colors">Lichtkrant</span>
                            </a>
                            <a href="admin-dashboard.html" class="nav-item flex flex-col items-center gap-1 p-2 rounded-xl group">
                                <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                                <span class="text-xs text-purple-400">Admin</span>
                            </a>
                        </div>
                    </div>
                </nav>
            `;
        }

        function renderEmployeesTab() {
            return `
                <div class="space-y-4 sm:space-y-6 animate-fade-in">
                    <div class="glass-card-strong rounded-xl sm:rounded-2xl p-4 sm:p-6">
                        <button onclick="window._adminFns.editEmployee(null)" class="bg-gradient-to-r from-green-600 to-emerald-600 text-white px-4 sm:px-6 py-2.5 sm:py-3 rounded-lg hover:from-green-700 hover:to-emerald-700 transition text-sm sm:text-base font-medium">
                            ➕ Nieuwe Medewerker
                        </button>
                    </div>

                    ${editingEmployee ? `
                        <div class="glass-card-strong rounded-xl sm:rounded-2xl p-4 sm:p-6 animate-fade-in">
                            <h3 class="text-lg sm:text-xl font-bold mb-4">${editingEmployee.id ? 'Medewerker Bewerken' : 'Nieuwe Medewerker'}</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Naam</label>
                                    <input type="text" id="emp-naam" value="${editingEmployee.naam || ''}" class="w-full px-4 py-2.5 sm:py-3 glass-card rounded-lg text-white border border-white/10 focus:border-purple-500/50 focus:outline-none transition-all text-sm sm:text-base" placeholder="Volledige naam">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
                                    <input type="email" id="emp-email" value="${editingEmployee.email || ''}" class="w-full px-4 py-2.5 sm:py-3 glass-card rounded-lg text-white border border-white/10 focus:border-purple-500/50 focus:outline-none transition-all text-sm sm:text-base" placeholder="naam@nissewijs.nl">
                                </div>
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" id="emp-zichtbaar" ${editingEmployee.zichtbaar ? 'checked' : ''} class="w-5 h-5 rounded border-white/20 bg-white/5">
                                    <label class="text-sm font-medium text-slate-300">Zichtbaar op lichtkrant</label>
                                </div>
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <button onclick="window._adminFns.saveEmployee('${editingEmployee.id || ''}')" class="bg-gradient-to-r from-green-600 to-emerald-600 text-white px-6 py-2.5 rounded-lg hover:from-green-700 hover:to-emerald-700 transition font-medium text-sm sm:text-base">💾 Opslaan</button>
                                    <button onclick="window._adminFns.cancelEmployee()" class="glass-card text-slate-300 px-6 py-2.5 rounded-lg hover:bg-white/10 transition font-medium text-sm sm:text-base">✖️ Annuleren</button>
                                </div>
                            </div>
                        </div>
                    ` : ''}

                    <div class="glass-card-strong rounded-xl sm:rounded-2xl overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="glass-card">
                                    <tr>
                                        <th class="px-4 sm:px-6 py-3 sm:py-4 text-left text-xs sm:text-sm font-semibold text-slate-300">Naam</th>
                                        <th class="px-4 sm:px-6 py-3 sm:py-4 text-left text-xs sm:text-sm font-semibold text-slate-300 hidden sm:table-cell">Email</th>
                                        <th class="px-4 sm:px-6 py-3 sm:py-4 text-center text-xs sm:text-sm font-semibold text-slate-300">Zichtbaar</th>
                                        <th class="px-4 sm:px-6 py-3 sm:py-4 text-right text-xs sm:text-sm font-semibold text-slate-300">Acties</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-white/5">
                                    ${medewerkers.map(emp => `
                                        <tr class="hover:bg-white/5 transition-colors">
                                            <td class="px-4 sm:px-6 py-3 sm:py-4 font-medium text-sm sm:text-base">${emp.naam}</td>
                                            <td class="px-4 sm:px-6 py-3 sm:py-4 text-slate-400 text-xs sm:text-sm hidden sm:table-cell">${emp.email || ''}</td>
                                            <td class="px-4 sm:px-6 py-3 sm:py-4 text-center">
                                                <button onclick="window._adminFns.toggleVisibility('${JSON.stringify(emp).replace(/'/g, "\\'").replace(/"/g, '&quot;')}')" class="px-2 sm:px-4 py-1.5 sm:py-2 rounded-lg transition text-xs sm:text-sm ${emp.zichtbaar ? 'bg-green-500/20 text-green-300 border border-green-500/30 hover:bg-green-500/30' : 'bg-gray-500/20 text-gray-400 border border-gray-500/30 hover:bg-gray-500/30'}">
                                                    ${emp.zichtbaar ? '👁️ Zichtbaar' : '🚫 Verborgen'}
                                                </button>
                                            </td>
                                            <td class="px-4 sm:px-6 py-3 sm:py-4">
                                                <div class="flex gap-1 sm:gap-2 justify-end">
                                                    <button onclick="window._adminFns.editEmployee('${JSON.stringify(emp).replace(/'/g, "\\'").replace(/"/g, '&quot;')}')" class="px-2 sm:px-4 py-1.5 sm:py-2 text-blue-400 bg-blue-500/20 border border-blue-500/30 rounded-lg hover:bg-blue-500/30 transition text-xs sm:text-sm">
                                                        <span class="hidden sm:inline">✏️ Bewerken</span><span class="sm:hidden">✏️</span>
                                                    </button>
                                                    <button onclick="window._adminFns.deleteEmployee('${emp.id}')" class="px-2 sm:px-4 py-1.5 sm:py-2 text-red-400 bg-red-500/20 border border-red-500/30 rounded-lg hover:bg-red-500/30 transition text-xs sm:text-sm">
                                                        <span class="hidden sm:inline">🗑️ Verwijderen</span><span class="sm:hidden">🗑️</span>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>`;
        }

        function renderAnnouncementsTab() {
            return `
                <div class="space-y-4 sm:space-y-6 animate-fade-in">
                    <div class="glass-card-strong rounded-xl sm:rounded-2xl p-4 sm:p-6">
                        <button onclick="window._adminFns.editAnnouncement(null)" class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white px-4 sm:px-6 py-2.5 sm:py-3 rounded-lg hover:from-blue-700 hover:to-cyan-700 transition text-sm sm:text-base font-medium">
                            ➕ Nieuwe Mededeling
                        </button>
                    </div>

                    ${editingAnnouncement ? `
                        <div class="glass-card-strong rounded-xl sm:rounded-2xl p-4 sm:p-6 animate-fade-in">
                            <h3 class="text-lg sm:text-xl font-bold mb-4">${editingAnnouncement.id ? 'Mededeling Bewerken' : 'Nieuwe Mededeling'}</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Titel</label>
                                    <input type="text" id="ann-titel" value="${editingAnnouncement.titel || ''}" class="w-full px-4 py-2.5 sm:py-3 glass-card rounded-lg text-white border border-white/10 focus:border-purple-500/50 focus:outline-none transition-all text-sm sm:text-base" placeholder="Titel van de mededeling">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Bericht</label>
                                    <textarea id="ann-bericht" class="w-full px-4 py-2.5 sm:py-3 glass-card rounded-lg text-white border border-white/10 focus:border-purple-500/50 focus:outline-none transition-all text-sm sm:text-base" rows="4" placeholder="Bericht tekst">${editingAnnouncement.bericht || ''}</textarea>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Prioriteit</label>
                                    <select id="ann-prioriteit" class="w-full px-4 py-2.5 sm:py-3 glass-card rounded-lg text-white border border-white/10 focus:border-purple-500/50 focus:outline-none transition-all text-sm sm:text-base">
                                        <option value="Normaal" ${editingAnnouncement.prioriteit === 'Normaal' ? 'selected' : ''}>Normaal</option>
                                        <option value="Hoog" ${editingAnnouncement.prioriteit === 'Hoog' ? 'selected' : ''}>Hoog</option>
                                    </select>
                                </div>
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" id="ann-actief" ${editingAnnouncement.actief ? 'checked' : ''} class="w-5 h-5 rounded border-white/20 bg-white/5">
                                    <label class="text-sm font-medium text-slate-300">Actief (zichtbaar op lichtkrant)</label>
                                </div>
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <button onclick="window._adminFns.saveAnnouncement('${editingAnnouncement.id || ''}')" class="bg-gradient-to-r from-green-600 to-emerald-600 text-white px-6 py-2.5 rounded-lg hover:from-green-700 hover:to-emerald-700 transition font-medium text-sm sm:text-base">💾 Opslaan</button>
                                    <button onclick="window._adminFns.cancelAnnouncement()" class="glass-card text-slate-300 px-6 py-2.5 rounded-lg hover:bg-white/10 transition font-medium text-sm sm:text-base">✖️ Annuleren</button>
                                </div>
                            </div>
                        </div>
                    ` : ''}

                    <div class="space-y-3 sm:space-y-4">
                        ${mededelingen.map(ann => `
                            <div class="glass-card-strong rounded-xl sm:rounded-2xl p-4 sm:p-6">
                                <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
                                    <div class="flex-1 min-w-0">
                                        <div class="flex flex-wrap items-center gap-2 mb-2">
                                            <h3 class="text-base sm:text-lg font-bold break-words">${ann.titel}</h3>
                                            <span class="px-2 sm:px-3 py-1 rounded-full text-xs font-medium ${ann.prioriteit === 'Hoog' ? 'bg-red-500/20 text-red-300 border border-red-500/30' : 'bg-blue-500/20 text-blue-300 border border-blue-500/30'}">${ann.prioriteit}</span>
                                            <span class="px-2 sm:px-3 py-1 rounded-full text-xs font-medium ${ann.actief ? 'bg-green-500/20 text-green-300 border border-green-500/30' : 'bg-gray-500/20 text-gray-400 border border-gray-500/30'}">${ann.actief ? 'Actief' : 'Inactief'}</span>
                                        </div>
                                        <p class="text-slate-400 mb-2 text-sm sm:text-base break-words">${ann.bericht}</p>
                                        ${ann.datum ? `<p class="text-xs sm:text-sm text-slate-500">${new Date(ann.datum).toLocaleDateString('nl-NL')}</p>` : ''}
                                    </div>
                                    <div class="flex sm:flex-col gap-2 flex-shrink-0">
                                        <button onclick="window._adminFns.toggleActive('${JSON.stringify(ann).replace(/'/g, "\\'").replace(/"/g, '&quot;')}')" class="px-3 py-2 rounded-lg transition ${ann.actief ? 'bg-green-500/20 text-green-300 border border-green-500/30 hover:bg-green-500/30' : 'bg-gray-500/20 text-gray-400 border border-gray-500/30 hover:bg-gray-500/30'}">${ann.actief ? '👁️' : '🚫'}</button>
                                        <button onclick="window._adminFns.editAnnouncement('${JSON.stringify(ann).replace(/'/g, "\\'").replace(/"/g, '&quot;')}')" class="px-3 py-2 text-blue-400 bg-blue-500/20 border border-blue-500/30 rounded-lg hover:bg-blue-500/30 transition">✏️</button>
                                        <button onclick="window._adminFns.deleteAnnouncement('${ann.id}')" class="px-3 py-2 text-red-400 bg-red-500/20 border border-red-500/30 rounded-lg hover:bg-red-500/30 transition">🗑️</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        render();
    </script>
</body>
</html>

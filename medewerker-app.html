<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aanwezigheid - Medewerker App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
*{
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}

.gradient-bg{
    background:linear-gradient(135deg,#1e293b 0%,#334155 100%);
    min-height:100vh;
}

.gradient-bg::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 50%, rgba(59,130,246,.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(168,85,247,.15) 0%, transparent 50%);
    pointer-events:none;
}

.glass-card{
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
}

.teacher-card{
    transition:.2s;
}

.teacher-card:active{
    transform:scale(.97);
}

.bottom-nav{ background:rgba(30,41,59,.8); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,.08); box-shadow:0 -10px 40px rgba(0,0,0,.3); } .nav-item{ transition:all .3s ease; } .nav-item:hover{ background:rgba(255,255,255,.05); } .nav-item:active{ transform:scale(.95);
}
</style>
</head>

<body>

<div id="app"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, addDoc, updateDoc, onSnapshot, query, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ====================================
// FIREBASE CONFIG — vul jouw gegevens in
// ====================================
   const firebaseConfig = {
  	apiKey: "AIzaSyD9w-uzVhuvfIR5_UH-xcMKJPAlpx5fKRk",
  	authDomain: "aanwezigheid-app.firebaseapp.com",
  	projectId: "aanwezigheid-app",
  	storageBucket: "aanwezigheid-app.firebasestorage.app",
  	messagingSenderId: "188437676924",
  	appId: "1:188437676924:web:194eb53f7c6eb40ec3daf9",
  	measurementId: "G-V8WM335NFL"
     };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ====================================
// STATE
// ====================================
let medewerkers = [];
let statusMap = {};
let loading = true;

// ====================================
// INIT
// ====================================
async function init(){
    // Medewerkers zijn statisch — eenmalig ophalen is voldoende
    const snapshot = await getDocs(collection(db, 'medewerkers'));
    medewerkers = snapshot.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(m => m.naam);

    // Aanwezigheid via onSnapshot — realtime, geen polling
    const now = new Date();
    const startVanDag = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const eindeVanDag = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);

    const q = query(
        collection(db, 'aanwezigheid'),
        where('datum', '>=', Timestamp.fromDate(startVanDag)),
        where('datum', '<', Timestamp.fromDate(eindeVanDag))
    );

    onSnapshot(q, (snapshot) => {
        statusMap = {};
        snapshot.docs.forEach(d => {
            const data = d.data();
            statusMap[data.naam] = data.status;
        });
        loading = false;
        render();
    });
}

// ====================================
// TOGGLE
// ====================================
async function toggleStatus(naam){
    const huidigeStatus = statusMap[naam] || 'Afwezig';
    const nieuweStatus = huidigeStatus === 'Aanwezig' ? 'Afwezig' : 'Aanwezig';

    // Optimistisch updaten zodat de tegel direct reageert
    statusMap[naam] = nieuweStatus;
    render();

    try {
        const now = new Date();
        const startVanDag = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const eindeVanDag = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);

        const q = query(
            collection(db, 'aanwezigheid'),
            where('naam', '==', naam),
            where('datum', '>=', Timestamp.fromDate(startVanDag)),
            where('datum', '<', Timestamp.fromDate(eindeVanDag))
        );
        const bestaand = await getDocs(q);

        if (!bestaand.empty) {
            await updateDoc(bestaand.docs[0].ref, {
                status: nieuweStatus,
                tijdstip: Timestamp.fromDate(now)
            });
        } else {
            await addDoc(collection(db, 'aanwezigheid'), {
                naam,
                datum: Timestamp.fromDate(now),
                status: nieuweStatus,
                tijdstip: Timestamp.fromDate(now)
            });
        }
    } catch(error) {
        // Terugdraaien bij fout
        statusMap[naam] = huidigeStatus;
        render();
    }
}

window.toggleStatus = toggleStatus;

// ====================================
// RENDER
// ====================================
function render(){

    const appEl = document.getElementById('app');

    if(loading){
        appEl.innerHTML=`
        <div class="gradient-bg flex items-center justify-center text-white">
            Laden...
        </div>
        `;
        return;
    }

    medewerkers.sort((a,b) => a.naam.localeCompare(b.naam,'nl'));

    appEl.innerHTML=`

    <div class="gradient-bg text-white pb-24">

        <div class="max-w-4xl mx-auto p-4">

            <div class="glass-card rounded-3xl p-6 mb-6">

                <h1 class="text-3xl font-bold mb-2">
                    Aanwezigheid
                </h1>

                <p class="text-slate-400">
                    Tik op je naam om je status te wijzigen
                </p>

            </div>

            <div class="grid grid-cols-2 gap-4">

            ${medewerkers.map(m=>{

                const status = statusMap[m.naam] || 'Afwezig';
                const aanwezig = status === 'Aanwezig';

                return `

                <button
                    onclick="toggleStatus('${m.naam}')"
                    class="
                    teacher-card
                    rounded-3xl
                    p-5
                    text-left
                    border-2

                    ${aanwezig
                        ? 'bg-green-500/20 border-green-500/40'
                        : 'bg-red-500/20 border-red-500/40'
                    }

                    glass-card
                    ">

                    <div class="text-2xl font-bold mb-2">

                        ${aanwezig ? '🟢' : '🔴'}
                        ${m.naam}

                    </div>

                    <div class="text-lg text-slate-300">

                        ${status}

                    </div>

                </button>

                `;

            }).join('')}

            </div>

            <!-- Fixed Bottom Navigation -->
            <nav class="bottom-nav fixed bottom-0 left-0 right-0 z-50">
                <div class="max-w-6xl mx-auto px-4 py-3 sm:py-4">
                    <div class="flex items-center justify-around">
                        
                        <a href="medewerker-app.html" class="nav-item flex flex-col items-center gap-1 p-2 rounded-xl group">
                            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            <span class="text-xs text-blue-400">Medewerker</span>
                        </a>

                        <a href="index.html" class="nav-item flex flex-col items-center gap-1 p-2 rounded-xl group">
                            <svg class="w-6 h-6 text-slate-400 group-hover:text-slate-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                            </svg>
                            <span class="text-xs text-slate-400 group-hover:text-slate-300 transition-colors">Home</span>
                        </a>

                        <a href="lichtkrant.html" class="nav-item flex flex-col items-center gap-1 p-2 rounded-xl group">
                            <svg class="w-6 h-6 text-slate-400 group-hover:text-green-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                            <span class="text-xs text-slate-400 group-hover:text-green-400 transition-colors">Lichtkrant</span>
                        </a>

                        <a href="admin-dashboard.html" class="nav-item flex flex-col items-center gap-1 p-2 rounded-xl group">
                            <svg class="w-6 h-6 text-slate-400 group-hover:text-purple-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                            <span class="text-xs text-slate-400 group-hover:text-purple-400 transition-colors">Admin</span>
                        </a>
                        
                    </div>
                </div>
            </nav>

        </div>
    </div>
    `;
}

init();

</script>

</body>
</html>
